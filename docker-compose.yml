name: auto-project-template

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-auto_project_template}
      POSTGRES_USER: ${POSTGRES_USER:-auto_project_template}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER:-auto_project_template} -d ${POSTGRES_DB:-auto_project_template}
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: apps/service-backend/Dockerfile
    restart: unless-stopped
    environment:
      SERVICE_BACKEND_DATABASE_URL: ${SHARED_SERVICE_BACKEND_DATABASE_URL:-postgresql+psycopg://auto_project_template:change-me@postgres:5432/auto_project_template}
      SERVICE_BACKEND_RUN_EMBEDDED_WORKER: "false"
      SERVICE_BACKEND_WORKER_HEARTBEAT_PATH: /runtime/service-worker.json
      SERVICE_BACKEND_HUB_API_URL: ${SERVICE_BACKEND_HUB_API_URL:-}
      SERVICE_BACKEND_HUB_API_V1_PREFIX: ${SERVICE_BACKEND_HUB_API_V1_PREFIX:-/api/v1}
      SERVICE_BACKEND_HUB_SERVICE_KEY: ${SERVICE_BACKEND_HUB_SERVICE_KEY:-}
      SERVICE_BACKEND_HUB_SERVICE_ID: ${SERVICE_BACKEND_HUB_SERVICE_ID:-}
      SERVICE_BACKEND_HUB_SERVICE_TOKEN: ${SERVICE_BACKEND_HUB_SERVICE_TOKEN:-}
      SERVICE_BACKEND_HUB_REQUEST_TIMEOUT_SECONDS: ${SERVICE_BACKEND_HUB_REQUEST_TIMEOUT_SECONDS:-5}
      SERVICE_BACKEND_HUB_SERVICE_CREDENTIALS_PATH: /runtime/hub-service-credentials.json
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "11010"
    volumes:
      - runtime_data:/runtime

  worker:
    build:
      context: .
      dockerfile: apps/service-worker/Dockerfile
    restart: unless-stopped
    environment:
      SERVICE_WORKER_DATABASE_URL: ${SHARED_SERVICE_WORKER_DATABASE_URL:-postgresql+psycopg://auto_project_template:change-me@postgres:5432/auto_project_template}
      SERVICE_WORKER_HEARTBEAT_PATH: /runtime/service-worker.json
      SERVICE_BACKEND_HUB_API_URL: ${SERVICE_BACKEND_HUB_API_URL:-}
      SERVICE_BACKEND_HUB_API_V1_PREFIX: ${SERVICE_BACKEND_HUB_API_V1_PREFIX:-/api/v1}
      SERVICE_BACKEND_HUB_SERVICE_ID: ${SERVICE_BACKEND_HUB_SERVICE_ID:-}
      SERVICE_BACKEND_HUB_SERVICE_TOKEN: ${SERVICE_BACKEND_HUB_SERVICE_TOKEN:-}
      SERVICE_BACKEND_HUB_REQUEST_TIMEOUT_SECONDS: ${SERVICE_BACKEND_HUB_REQUEST_TIMEOUT_SECONDS:-5}
      SERVICE_WORKER_HUB_SERVICE_CREDENTIALS_PATH: /runtime/hub-service-credentials.json
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - runtime_data:/runtime

  nginx:
    build:
      context: .
      dockerfile: infra/nginx/Dockerfile
      args:
        VITE_API_BASE_URL: ${SHARED_VITE_API_BASE_URL:-/api/v1}
    restart: unless-stopped
    environment:
      APP_DOMAIN: ${APP_DOMAIN:-auto-project-template.test}
      BACKEND_UPSTREAM: ${BACKEND_UPSTREAM:-backend:11010}
      TLS_CERT_PATH: ${TLS_CERT_PATH:-/etc/nginx/certs/tls.fullchain.crt}
      TLS_KEY_PATH: ${TLS_KEY_PATH:-/etc/nginx/certs/tls.key}
    depends_on:
      - backend
    volumes:
      - ./infra/nginx/certs:/etc/nginx/certs:ro
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"

volumes:
  postgres_data:
  runtime_data:
